<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E2DE2" />
      <stop offset="50%" stop-color="#7B1FA2" />
      <stop offset="100%" stop-color="#4A00E0" />
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Glow Graphic Group -->
  <g filter="url(#glow)">
    <!-- Central 4-Point Star (Sparkle) -->
    <path d="M 256 128 C 256 210 210 256 128 256 C 210 256 256 302 256 384 C 256 302 302 256 384 256 C 302 256 256 210 256 128 Z" 
          fill="none" 
          stroke="#E8E2FF" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Plus Icon (Top Right) -->
    <path d="M 370 170 H 410 M 390 150 V 190" 
          stroke="#E8E2FF" 
          stroke-width="16" 
          stroke-linecap="round" />

    <!-- Circle (Bottom Left) -->
    <circle cx="160" cy="350" r="20" 
            fill="none" 
            stroke="#E8E2FF" 
            stroke-width="16" />
  </g>
</svg>
